pipeline:
  use_autoencoder: True
  force_retrain: False

business_targets:
  "business_fp_target": 0.25    # Business False Positive Target
  "target_fpr": 0.001
  "threshold_strategy": "f1"    # "f1", "business"

lgbm_params:
  "objective": "binary"
  "metric": ["auc", "average_precision"]
  "boosting_type": "gbdt"
  "learning_rate": 0.07308155218896   # from HPO
  "num_leaves": 36                 # from HPO
  "max_depth": 6                   # from HPO # -1 means it has no limits, it could memorize identities
  "feature_fraction": 0.592444726907   # from HPO
  "bagging_fraction": 0.761012991294   # from HPO
  "bagging_freq": 5                 # from HPO
  "min_gain_to_split": 0.76014646375 # from HPO
  "lambda_l1": 0.3575782827       # from HPO
  "lambda_l2": 3.0075599047387 # from HPO
  "min_data_in_leaf": 100           # from HPO
  "scale_pos_weight": 1.93139122796545 # from HPO # penalty for error. Big value means aggressive model
  "verbose": -1

pytorch_params:
  latent_dim: 48                # from HPO
  learning_rate: 4.9817291e-05  # from HPO
  batch_size: 2048              # from HPO
  n_epochs: 150                 # from HPO

preprocessing:
  high_cardinality_threshold: 100

train_split:
  train_size: 0.7
  test_size: 0.15