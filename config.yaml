pipeline:
  use_autoencoder: False
  force_retrain: False

business_targets:
  "business_fp_target": 0.05    # Business False Positive Target
  "threshold_strategy": "f1"    # "f1", "business"

lgbm_params:
  "objective": "binary"
  "metric": ["auc", "average_precision"]
  "boosting_type": "gbdt"
  "learning_rate": 0.04326812777022993
  "num_leaves": 46
  "max_depth": 6
  "feature_fraction": 0.7951465798454141
  "bagging_fraction": 0.8140068172963008
  "bagging_freq": 2
  "min_gain_to_split": 0.7677607867288584
  "lambda_l1": 0.34079057646894473
  "lambda_l2": 0.5286743981802347
  "min_data_in_leaf": 183
  "scale_pos_weight": 2.3042399671763754
  "verbose": -1

pytorch_params:
  latent_dim: 61
  learning_rate: 0.000021318978
  batch_size: 256
  n_epochs: 50
preprocessing:
  high_cardinality_threshold: 100

train_split:
  train_size: 0.7
  test_size: 0.15