services:
  db:
    image: postgres:16
    container_name: postgres-db
    shm_size: '2gb'
    restart: always
    command: postgres -c max_wal_size=10GB -c checkpoint_timeout=10min -c work_mem=256MB -c maintenance_work_mem=512MB # increase 'RAM' for each operation up to 10GB, do not cache on disk too often.
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d:ro # init scripts folder
      - ./db/data:/data:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d bankdb && PGPASSWORD=password psql -U user -d bankdb -c 'SELECT 1 FROM train_final_features LIMIT 1;' && PGPASSWORD=password psql -U user -d bankdb -c 'SELECT 1 FROM test_final_features LIMIT 1;'" ]
      interval: 1m
      timeout: 10s
      retries: 60
      start_period: 20s

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5001:5000"
    volumes:
      - mlflow_artifacts:/mlruns
    command: mlflow server --host 0.0.0.0 --backend-store-uri sqlite:////mlruns/mlflow.db --default-artifact-root /mlruns/artifacts --allowed-hosts mlflow,mlflow:5000,localhost,localhost:5000,localhost:5001
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000')\""]
      interval: 4m
      timeout: 5s
      retries: 10
      start_period: 15s

  training:
    build:
      context: .
    container_name: fraud_training
    command: python -m src.pipelines.training_pipeline
    depends_on:
      db:
        condition: service_healthy # checks that it's not only started, but is also ready
      mlflow:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - .:/app
      - ./docs/plots:/app/docs/plots
      - ./models:/app/models
      - mlflow_artifacts:/mlruns

  api-service:
    build:
      context: .
    command: uvicorn src.app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db # overriding .env
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    depends_on:
      training:
        condition: service_completed_successfully

volumes:
  pg_data:
  mlflow_artifacts: