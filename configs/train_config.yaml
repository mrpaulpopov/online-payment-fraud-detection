#Да, это объясняет путаницу. Без системы трекинга экспериментов (типа MLflow) идея “зачем сохранять гиперпараметры” действительно выглядит лишней.
#Разложу без привязки к MLflow.
#1. Что происходит в простом ML-проекте без MLflow
#Представь самый базовый пайплайн:
#API → training script → model file (.pkl/.pt)
#Ты передаёшь:
#{
#  "learning_rate": 0.05,
#  "max_depth": 6
#}
#Скрипт:
#обучает модель
#сохраняет файл модели
#И всё.

#2. Проблема, которая возникает сразу
#Через неделю у тебя вопрос:
#какая именно модель лежит в этом файле?
#Ты НЕ знаешь:
#какие были гиперпараметры
#какие были фичи
#какая версия данных
#какой код
#Файл модели сам по себе этого не содержи


#3. Поэтому появляются конфиги
#Конфиг — это просто способ зафиксировать:
#“в каких условиях была обучена модель”
#Например:
#learning_rate: 0.05
#max_depth: 6
#features:
#  use_embeddings: true
#seed: 42

#Это нужно не для обучения, а для:
#воспроизводимости
#дебага
#сравнения моделей
#отката

#4. Где тут MLflow и почему он важен
#MLflow делает автоматически то, что ты иначе делаешь вручную:
#Без MLflow	С MLflow
#YAML файлы	автологирование параметров
#руками сохраняешь метрики	tracking UI
#сам кладёшь модель в папку	registry моделей
#сам сравниваешь эксперименты	сравнение в интерфейсе

#6. Почему нельзя “только API”
#Если не сохранять:
#ты не сможешь повторить лучший результат
#не поймёшь, почему модель стала хуже
#не сможешь сравнить версии

#2. Но YAML-конфиги он не заменяет полностью
#Потому что YAML — это не только “логирование”, это ещё:
#A) Управление запуском (configuration as code)
#Ты задаёшь:
#какие фичи включены
#какие компоненты пайплайна используются
#какой датасет брать
#какой preprocessing применять
#Это не всегда удобно хранить в MLflow UI.